    <style>
      body { font-family: 'Lato', sans-serif; }

      @keyframes fall {
        0% { transform: translateY(-10vh) translateX(0) rotate(0deg); opacity: 0; }
        10% { opacity: 0.8; }
        100% { transform: translateY(110vh) translateX(20px) rotate(360deg); opacity: 0; }

<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-floral-gradient text-slate-800 antialiased overflow-x-hidden min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect, useRef } = React;

      // --- FIREBASE ---
      const firebaseConfig = {
        apiKey: "AIzaSyBfpKEVKOmfYrdPatgILIGfp_wqGOUXxpo",
        authDomain: "abdulbari-e9b77.firebaseapp.com",
        databaseURL: "https://abdulbari-e9b77-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "abdulbari-e9b77",
        storageBucket: "abdulbari-e9b77.firebasestorage.app",
        messagingSenderId: "191778138220",
        appId: "1:191778138220:web:4665158af07d339dc01049",
        measurementId: "G-219EN72K4F"
      };

      let db = null;
      try {
        if (!firebase.apps.length) {
          firebase.initializeApp(firebaseConfig);
        }
        db = firebase.firestore();
      } catch (e) { console.error("Firebase init failed:", e); }

      // --- ICONS ---
      const IconWrapper = ({ children, className, onClick }) => (
        <svg onClick={onClick} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
          {children}
        </svg>
      );
      
      const Icons = {
        Calendar: (props) => <IconWrapper {...props}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></IconWrapper>,
        MapPin: (props) => <IconWrapper {...props}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></IconWrapper>,
        Phone: (props) => <IconWrapper {...props}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></IconWrapper>,
        Heart: (props) => <IconWrapper {...props}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></IconWrapper>,
        HeartFill: (props) => <IconWrapper {...props}><path fill="currentColor" d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></IconWrapper>,
        Sparkles: (props) => <IconWrapper {...props}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></IconWrapper>,
        Shirt: (props) => <IconWrapper {...props}><path d="M20.38 3.46 16 2a4 4 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.47a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.47a2 2 0 0 0-1.34-2.23z"/></IconWrapper>,
        Gift: (props) => <IconWrapper {...props}><rect x="3" y="8" width="18" height="4" rx="1"/><path d="M12 8v13"/><path d="M19 12v7a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-7"/><path d="M7.5 8a2.5 2.5 0 0 1 0-5A4.8 8 0 0 1 12 8a4.8 8 0 0 1 4.5-5 2.5 2.5 0 0 1 0 5"/></IconWrapper>,
        Loader: (props) => <IconWrapper {...props}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></IconWrapper>,
        Lock: (props) => <IconWrapper {...props}><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></IconWrapper>,
        Trash2: (props) => <IconWrapper {...props}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></IconWrapper>,
        ThumbsUp: (props) => <IconWrapper {...props}><path d="M7 10v12"/><path d="M15 5.88 14 10h5.83a2 2 0 0 1 1.92 2.56l-2.33 8A2 2 0 0 1 17.5 22H4a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h2.76a2 2 0 0 0 1.79-1.11L12 2h0a3.13 3.13 0 0 1 3 3.88Z"/></IconWrapper>,
      };

      // --- CONSTANTS & LOGIC ---
      const WEDDING_DETAILS = {
        groom: { name: "Abdul Bari", father: "Namir Khan" },
        bride: { name: "Daughter of", father: "Muhammad Ali Khan" },
        date: "2026-04-25",
        venue: {
          name: "ELEGANCE ARENA",
          address: "Opposite Eclipse, Ring Road, Peshawar",
          mapLink: "https://maps.app.goo.gl/MeKaEWAN8S5CTwGZ7" 
        },
        hosts: [
            { name: "Muhammad Yaseen Khan", phone: "0315-9020000" },
            { name: "Muhammad Ilyas Khan", phone: "0300-5940816" },
            { name: "Abdul Bari", phone: "0300-9595912" }
        ]
      };

      const SYSTEM_PROMPTS = {
        wishes: `You are a warm, poetic wedding assistant. Generate 3 short, heartfelt wedding wishes for Abdul Bari. Tone: Emotional, Islamic blessings, or Family-centric. Output format: JSON array of strings.`,
        outfits: `You are a stylist for a wedding in Peshawar, Pakistan in April (Spring). Suggest 3 outfit ideas for a guest. Output format: JSON array of objects with 'title' and 'description'.`,
        gifts: `Suggest 3 thoughtful gift ideas for a young couple in Pakistan. Output format: JSON array of objects with 'title' and 'description'.`
      };

      const FALLBACK_RESPONSES = {
        wishes: [
           "May Allah bless your union with love, patience, and endless joy. Mubarak to Abdul Bari!",
           "Wishing you both a lifetime of happiness. May your home be filled with laughter and blessings.",
           "Heartiest congratulations! May this new chapter bring you closer to each other and to Allah."
        ],
        outfits: [
            { title: "Velvet Shawl & Shalwar Kameez", description: "A rich maroon or emerald green velvet shawl over a classic suit adds warmth and regal elegance." },
            { title: "Embroidered Waistcoat", description: "For men, a wool waistcoat with subtle embroidery keeps you warm while looking sharp." },
            { title: "Pashmina Wrap", description: "A high-quality Pashmina is perfect for the chilly Peshawar evening air." }
        ],
        gifts: [
            { title: "Home Appliance", description: "A quality air fryer or coffee machine is practical for a new home." },
            { title: "Personalized Prayer Mats", description: "A beautiful set of matching prayer rugs is a blessed gift." },
            { title: "Dinner Set", description: "A classic bone china dinner set for their future hosting." }
        ]
      };

      const generateContent = async (type, promptText) => {
        if (!window.process?.env?.API_KEY) return FALLBACK_RESPONSES[type];
        try {
           const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${window.process.env.API_KEY}`, {
             method: 'POST',
             headers: { 'Content-Type': 'application/json' },
             body: JSON.stringify({ contents: [{ parts: [{ text: SYSTEM_PROMPTS[type] + "\nUser Request: " + promptText }] }] })
           });
           if (!response.ok) throw new Error(`API Error: ${response.status}`);
           const data = await response.json();
           const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
           if (!text) return FALLBACK_RESPONSES[type];
           const jsonStr = text.replace(/```json/g, '').replace(/```/g, '').trim();
           return JSON.parse(jsonStr);
        } catch (error) {
           return FALLBACK_RESPONSES[type];
        }
      };

      // --- COMPONENTS ---

      const useTracker = () => {
          const [counts, setCounts] = useState({ visits: 0, likes: 0, loves: 0 });
          
          useEffect(() => {
              if (!db) return;
              
              // Increment visit once per session
              if (!sessionStorage.getItem('visited')) {
                  db.collection('stats').doc('engagement').set({
                      visits: firebase.firestore.FieldValue.increment(1)
                  }, { merge: true }).catch(e => console.log("Offline/Error", e));
                  sessionStorage.setItem('visited', 'true');
              }

              // Listen for changes
              const unsub = db.collection('stats').doc('engagement').onSnapshot(doc => {
                  if (doc.exists) setCounts(doc.data());
              }, (err) => console.log(err));
              
              return () => unsub && unsub();
          }, []);

          const handleReact = (type) => {
               if (!db) return;
               db.collection('stats').doc('engagement').set({
                   [type]: firebase.firestore.FieldValue.increment(1)
               }, { merge: true }).catch(e => console.log("Offline/Error", e));
          };

          return { counts, handleReact };
      };

      const ReactionDock = ({ counts, onReact }) => {
          const [loved, setLoved] = useState(false);

          const handleLove = () => {
              onReact('loves');
              setLoved(true);
              setTimeout(() => setLoved(false), 500);

              // Confetti Animation
              if (window.confetti) {
                  const duration = 3000;
                  const end = Date.now() + duration;

                  // Elegant colors: Rose, Gold, Pink, Cream
                  const colors = ['#f43f5e', '#D4AF37', '#ffe4e6', '#FCFBF4'];

                  (function frame() {
                    confetti({
                      particleCount: 5,
                      angle: 60,
                      spread: 55,
                      origin: { x: 0 },
                      colors: colors
                    });
                    confetti({
                      particleCount: 5,
                      angle: 120,
                      spread: 55,
                      origin: { x: 1 },
                      colors: colors
                    });

                    if (Date.now() < end) {
                      requestAnimationFrame(frame);
                    }
                  }());
              }
          };

          return (
            <div className="fixed bottom-6 right-6 z-50 flex gap-4 flex-col items-end pointer-events-auto">
                {/* Love Button */}
                <div className="flex items-center gap-3">
                    <span className="bg-white/90 backdrop-blur-sm text-xs font-bold px-2 py-1 rounded-md shadow-sm text-rose-600 font-mono">
                        {counts.loves || 0}
                    </span>
                    <button onClick={handleLove} 
                        className={`p-3 rounded-full shadow-lg transition-all transform hover:scale-105 active:scale-95 ${loved ? 'bg-rose-500 text-white animate-bounce-short' : 'bg-white text-rose-500 border border-rose-100'}`}>
                        <Icons.HeartFill className={`w-6 h-6 ${loved ? 'scale-110' : ''}`} />
                    </button>
                </div>
            </div>
          );
      };

      const HeartDivider = () => (
        <div className="flex items-center justify-center gap-4 my-8 w-full max-w-xs mx-auto opacity-60">
            <div className="h-px bg-rose-300 flex-1"></div>
            <Icons.HeartFill className="w-4 h-4 text-rose-300" />
            <div className="h-px bg-rose-300 flex-1"></div>
        </div>
      );

      // 1. Petals
      const PetalBackground = () => {
        const [petals, setPetals] = useState([]);
        useEffect(() => {
          const createPetal = () => ({
            id: Math.random(),
            left: Math.random() * 100,
            animationDuration: 8 + Math.random() * 10,
            delay: Math.random() * 5,
            size: 15 + Math.random() * 20,
            type: Math.random() > 0.5 ? '🌸' : '🍂' 
          });
          setPetals(Array.from({ length: 30 }, createPetal));
          const i = setInterval(() => setPetals(p => [...p.slice(-40), createPetal()]), 2500);
          return () => clearInterval(i);
        }, []);
        return (
          <div className="fixed inset-0 pointer-events-none overflow-hidden z-0">
            {petals.map(p => (
              <div key={p.id} className="absolute animate-fall opacity-70" style={{
                  left: `${p.left}%`, animationDuration: `${p.animationDuration}s`, animationDelay: `${p.delay}s`,
                  fontSize: `${p.size}px`, top: '-30px'
                }}>{p.type}</div>
            ))}
          </div>
        );
      };

      // 2. Wedding Concierge
      const WeddingConcierge = () => {
        const [activeTab, setActiveTab] = useState('wishes');
        const [loading, setLoading] = useState(false);
        const [result, setResult] = useState(null);
        const [customInput, setCustomInput] = useState('');

        const handleGenerate = async () => {
            setLoading(true);
            const data = await generateContent(activeTab, customInput);
            setResult(data);
            setLoading(false);
        };

        const tabs = [
            { id: 'wishes', label: 'Wishes', icon: Icons.Heart },
            { id: 'outfits', label: 'Attire', icon: Icons.Shirt },
            { id: 'gifts', label: 'Gifts', icon: Icons.Gift },
        ];

        return (
            <div className="my-10 bg-white/60 backdrop-blur-md rounded-2xl p-6 border border-rose-200 shadow-xl relative overflow-hidden">
                <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-rose-200 via-rose-400 to-rose-200"></div>
                <h3 className="text-4xl font-script text-center text-rose-800 mb-6 flex items-center justify-center gap-2 pt-2">
                    Wedding Concierge
                </h3>
                <div className="flex justify-center gap-2 mb-6">
                    {tabs.map(tab => (
                        <button key={tab.id} onClick={() => { setActiveTab(tab.id); setResult(null); }}
                            className={`px-4 py-2 rounded-full text-sm font-bold transition-all ${
                                activeTab === tab.id ? 'bg-rose-500 text-white shadow-md' : 'bg-white text-rose-900 hover:bg-rose-50'
                            }`}>
                            {tab.label}
                        </button>
                    ))}
                </div>
                <div className="flex gap-2 border-b-2 border-rose-100 pb-2 mb-4">
                     <input type="text" placeholder={activeTab === 'wishes' ? "e.g., Islamic blessings..." : "e.g., Budget friendly..."}
                        className="flex-1 bg-transparent text-slate-800 placeholder-rose-300 focus:outline-none"
                        value={customInput} onChange={(e) => setCustomInput(e.target.value)} />
                     <button onClick={handleGenerate} className="text-rose-500 hover:text-rose-700 transition-colors">
                        <Icons.Sparkles className="w-6 h-6" />
                     </button>
                </div>
                {loading && <div className="text-center py-4 text-rose-400"><Icons.Loader className="animate-spin inline" /></div>}
                {result && (
                    <div className="space-y-4">
                        {result.map((item, i) => (
                            <div key={i} className="bg-white/80 p-4 rounded-lg shadow-sm border-l-4 border-rose-400 animate-float" style={{ animationDelay: `${i*0.2}s` }}>
                                {activeTab === 'wishes' ? <p className="italic text-slate-700 font-serif">"{item}"</p> : 
                                <div><h4 className="font-bold text-rose-600 text-sm mb-1">{item.title}</h4><p className="text-slate-600 text-sm">{item.description}</p></div>}
                            </div>
                        ))}
                    </div>
                )}
            </div>
        );
      };

      // 3. Guestbook
      const Guestbook = () => {
        const [messages, setMessages] = useState([]);
        const [name, setName] = useState('');
        const [msg, setMsg] = useState('');
        const [loading, setLoading] = useState(false);
        const [isAdmin, setIsAdmin] = useState(false);
        const [isOfflineMode, setIsOfflineMode] = useState(false);

        const loadLocalMessages = () => {
             const saved = JSON.parse(localStorage.getItem('guestbook_local') || '[]');
             setMessages(saved);
        };

        useEffect(() => {
          if (!db) { setIsOfflineMode(true); loadLocalMessages(); return; }
          const unsubscribe = db.collection('guestbook').orderBy('createdAt', 'desc').limit(50).onSnapshot(snapshot => {
              setMessages(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
            }, () => { setIsOfflineMode(true); loadLocalMessages(); });
          return () => unsubscribe();
        }, []);

        const handleSubmit = async (e) => {
          e.preventDefault();
          if (!name.trim() || !msg.trim()) return;
          setLoading(true);
          const newMsg = { id: Date.now(), name: name.trim(), message: msg.trim(), createdAt: new Date().toISOString() };
          
          try {
            if (db && !isOfflineMode) {
              await db.collection('guestbook').add({ name: name.trim(), message: msg.trim(), createdAt: new Date().toISOString() });
            } else { throw new Error('Offline'); }
          } catch (error) {
            setIsOfflineMode(true);
            const saved = JSON.parse(localStorage.getItem('guestbook_local') || '[]');
            localStorage.setItem('guestbook_local', JSON.stringify([newMsg, ...saved]));
            setMessages(prev => [newMsg, ...prev]);
          }
          setMsg(''); setLoading(false);
        };

        const handleDelete = async (id) => {
           if(confirm("Delete message?")) {
               if(isOfflineMode) {
                   const u = messages.filter(m=>m.id!==id); localStorage.setItem('guestbook_local', JSON.stringify(u)); setMessages(u);
               } else {
                   await db.collection('guestbook').doc(id).delete();
               }
           }
        };

        return (
          <div className="bg-white/80 backdrop-blur-md rounded-2xl p-8 shadow-xl border border-rose-100 mt-12 relative">
            <div className="flex items-center justify-center mb-6 relative">
                <h3 className="text-4xl font-script text-rose-800 text-center">Guestbook</h3>
                <button onClick={() => { if(isAdmin) setIsAdmin(false); else if(prompt("Password")==="admin123") setIsAdmin(true); }} className="absolute right-0 top-1/2 -translate-y-1/2 text-rose-300 hover:text-rose-500"><Icons.Lock className="w-4 h-4" /></button>
            </div>
            
            <form onSubmit={handleSubmit} className="mb-8 space-y-4">
                <input type="text" placeholder="Your Name" value={name} onChange={e=>setName(e.target.value)} className="w-full bg-rose-50/50 border border-rose-200 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-rose-300" required />
                <textarea placeholder="Write a blessing..." value={msg} onChange={e=>setMsg(e.target.value)} className="w-full bg-rose-50/50 border border-rose-200 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-rose-300 h-24 resize-none" required />
                <button disabled={loading} type="submit" className="w-full bg-gradient-to-r from-rose-500 to-pink-600 text-white py-3 rounded-lg font-bold shadow-md hover:shadow-lg transition-all">{loading ? "SIGNING..." : "POST MESSAGE"}</button>
            </form>

            <div className="space-y-4 max-h-96 overflow-y-auto custom-scrollbar pr-2">
                {messages.map((m) => (
                    <div key={m.id} className="bg-white p-4 rounded-xl shadow-sm border border-rose-50 relative group">
                        <div className="flex justify-between items-baseline mb-2">
                            <h4 className="font-bold text-rose-800">{m.name}</h4>
                            <div className="flex gap-2 items-center">
                                <span className="text-xs text-slate-400">{new Date(m.createdAt).toLocaleDateString(undefined, {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'})}</span>
                                {isAdmin && <button onClick={()=>handleDelete(m.id)} className="text-red-400 hover:text-red-600"><Icons.Trash2 className="w-3 h-3"/></button>}
                            </div>
                        </div>
                        <p className="text-slate-600 font-serif italic">"{m.message}"</p>
                    </div>
                ))}
            </div>
          </div>
        );
      };

      const InvitationCard = ({ counts }) => {
        const [timeLeft, setTimeLeft] = useState({ d: 0, h: 0, m: 0, s: 0 });

        useEffect(() => {
          const t = setInterval(() => {
            const diff = new Date('2026-04-25T20:00:00') - new Date();
            if (diff > 0) setTimeLeft({ d: Math.floor(diff/(1000*60*60*24)), h: Math.floor((diff/(1000*60*60))%24), m: Math.floor((diff/1000/60)%60), s: Math.floor((diff/1000)%60) });
          }, 1000);
          return () => clearInterval(t);
        }, []);

        return (
          <div className="relative w-full max-w-2xl mx-auto my-8 p-4 md:p-8 z-10 animate-float">
            
            {/* MAIN CARD */}
            <div className="bg-cream/95 backdrop-blur-xl shadow-2xl rounded-sm border-[12px] border-double border-gold-300 overflow-hidden relative">
                
                {/* Ornamental Corners */}
                <svg className="absolute top-0 left-0 w-24 h-24 text-gold-400 z-0 pointer-events-none" viewBox="0 0 100 100" fill="currentColor"><path d="M0 0v100h2v-98h98v-2h-100z"/></svg>
                <svg className="absolute top-0 right-0 w-24 h-24 text-gold-400 z-0 pointer-events-none rotate-90" viewBox="0 0 100 100" fill="currentColor"><path d="M0 0v100h2v-98h98v-2h-100z"/></svg>
                <svg className="absolute bottom-0 right-0 w-24 h-24 text-gold-400 z-0 pointer-events-none rotate-180" viewBox="0 0 100 100" fill="currentColor"><path d="M0 0v100h2v-98h98v-2h-100z"/></svg>
                <svg className="absolute bottom-0 left-0 w-24 h-24 text-gold-400 z-0 pointer-events-none -rotate-90" viewBox="0 0 100 100" fill="currentColor"><path d="M0 0v100h2v-98h98v-2h-100z"/></svg>

                <div className="relative z-10 px-6 py-12 md:px-12 md:py-20 flex flex-col items-center text-center">
                    
                    {/* Header Flowers */}
                    <div className="text-4xl md:text-5xl mb-6 animate-pulse">🌸 🌿 🌸</div>
                    
                    <p className="font-serif text-gold-600 uppercase tracking-widest text-sm mb-2">In the name of Allah</p>
                    <h2 className="font-script text-3xl text-rose-900 mb-4">Bismillah</h2>
                    
                    <div className="mb-10 flex flex-col items-center">
                        <div className="h-px w-32 bg-gradient-to-r from-transparent via-gold-400 to-transparent mb-4 opacity-60"></div>
                        <h3 className="font-script text-5xl md:text-6xl text-gold-600 drop-shadow-sm px-4 leading-tight">Walima Ceremony</h3>
                        <div className="h-px w-32 bg-gradient-to-r from-transparent via-gold-400 to-transparent mt-4 opacity-60"></div>
                    </div>

                    <p className="font-serif text-slate-500 italic mb-6">Mr. & Mrs. Namir Khan request the honor of your presence on the occasion of the Walima Ceremony of their beloved son</p>
                    
                    {/* Names */}
                    <div className="mb-10 w-full space-y-8">
                        <div>
                            <h1 className="font-script text-6xl md:text-7xl text-rose-600 drop-shadow-sm">{WEDDING_DETAILS.groom.name}</h1>
                        </div>
                        <div className="font-script text-4xl text-gold-500">with</div>
                        <div>
                            <h1 className="font-script text-5xl md:text-6xl text-rose-600 drop-shadow-sm">{WEDDING_DETAILS.bride.name}</h1>
                            <p className="font-serif text-slate-500 italic mt-2">{WEDDING_DETAILS.bride.father}</p>
                        </div>
                    </div>

                    <p className="font-serif text-slate-700 text-lg leading-relaxed max-w-md mx-auto mb-8">
                        As they begin their journey together.
                    </p>

                    <HeartDivider />

                    {/* NEW ELEGANT DATE LAYOUT */}
                    <div className="text-center my-6">
                        <h3 className="text-lg md:text-xl tracking-[0.5em] text-slate-600 uppercase mb-4 font-sans font-light">April</h3>
                        <div className="flex items-center justify-center gap-4 md:gap-8 font-serif text-rose-900 py-2">
                            <span className="text-2xl md:text-3xl font-serif italic tracking-wide text-rose-800">Saturday</span>
                            <div className="h-12 w-px bg-gold-400"></div>
                            {/* Refined Date Number: Thinner, Italic, Elegant */}
                            <span className="text-7xl md:text-8xl font-serif italic text-rose-600 mx-2 font-normal leading-none" style={{ fontFamily: '"Playfair Display", serif' }}>25</span>
                            <div className="h-12 w-px bg-gold-400"></div>
                            <span className="text-2xl md:text-3xl font-serif italic tracking-wide whitespace-nowrap text-rose-800">8 - 11 PM</span>
                        </div>
                        <h3 className="text-lg md:text-xl tracking-[0.5em] text-slate-600 uppercase mt-4 font-sans font-light">2026</h3>
                        <p className="text-gold-600 font-serif italic text-sm mt-2">Dinner</p>
                    </div>

                    {/* Venue */}
                    <div className="mb-8 bg-rose-50/50 p-6 rounded-xl w-full border border-rose-100">
                         <h3 className="font-serif text-xl font-bold text-rose-900 mb-1">{WEDDING_DETAILS.venue.name}</h3>
                         <p className="text-slate-600 mb-3">{WEDDING_DETAILS.venue.address}</p>
                         <a href={WEDDING_DETAILS.venue.mapLink} target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-1 text-white bg-gold-400 hover:bg-gold-500 px-4 py-2 rounded-full text-sm font-bold shadow-md transition-all">
                             <Icons.MapPin className="w-4 h-4" /> View Map
                         </a>
                    </div>

                    <HeartDivider />

                    {/* Minimalist Countdown */}
                    <div className="flex justify-center items-center gap-4 md:gap-8 mb-10 w-full">
                        {Object.entries(timeLeft).map(([k, v]) => (
                            <div key={k} className="flex flex-col items-center">
                                <span className="text-3xl md:text-4xl font-serif text-rose-800 font-bold leading-none">{v}</span>
                                <span className="text-[10px] md:text-xs text-slate-400 uppercase tracking-widest mt-1">{k==='d'?'Days':k==='h'?'Hrs':k==='m'?'Mins':'Secs'}</span>
                            </div>
                        ))}
                    </div>

                    {/* Save Date Button */}
                    <button onClick={() => window.open(`https://calendar.google.com/calendar/render?action=TEMPLATE&text=Walima+Ceremony+of+Abdul+Bari&dates=20260425T200000/20260425T230000&details=Walima+Ceremony+Dinner&location=${encodeURIComponent(WEDDING_DETAILS.venue.name)}&sf=true&output=xml`, '_blank')}
                        className="bg-gradient-to-r from-gold-400 to-yellow-500 text-white px-8 py-3 rounded-full font-bold shadow-lg hover:shadow-xl transform hover:-translate-y-1 transition-all flex items-center gap-2 mb-8">
                        <Icons.Calendar className="w-5 h-5"/> Add to Calendar
                    </button>

                    <HeartDivider />

                    {/* R.S.V.P Section */}
                    <div className="w-full mb-8">
                        <h3 className="font-serif text-2xl text-gold-600 mb-4 uppercase tracking-widest">R.S.V.P</h3>
                        <div className="flex flex-wrap justify-center gap-2 text-slate-700 font-serif italic">
                            <span>Muhammad Yaseen Khan,</span>
                            <span>Muhammad Ilyas Khan,</span>
                            <span>Malik Kifayat Ullah,</span>
                            <span>Ahmad Yar</span>
                        </div>
                    </div>

                    <HeartDivider />

                    {/* Hosts - Royal Nameplates */}
                    <div className="w-full">
                        <p className="text-center font-serif text-slate-500 italic mb-6">Contact Information</p>
                        <div className="grid md:grid-cols-3 gap-4">
                             {WEDDING_DETAILS.hosts.filter(h => h.phone).map((host, i) => (
                                 <div key={i} className="bg-white border-t-4 border-gold-300 shadow-sm p-4 rounded-b-lg text-center hover:bg-rose-50 transition-colors">
                                     <h4 className="font-serif text-lg font-bold text-rose-900 mb-3">{host.name}</h4>
                                     <div className="flex justify-center gap-4">
                                         <button onClick={()=>window.location.href=`tel:${host.phone}`} className="p-2 bg-slate-100 rounded-full text-slate-600 hover:bg-blue-100 hover:text-blue-600 transition-colors"><Icons.Phone className="w-5 h-5"/></button>
                                         <button onClick={()=>window.open(`https://wa.me/${host.phone.replace(/\D/g,'')}`, '_blank')} className="p-2 bg-slate-100 rounded-full text-slate-600 hover:bg-green-100 hover:text-green-600 transition-colors"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 21l1.65-3.8a9 9 0 1 1 3.4 2.9L3 21"/><path d="M9 10a.5.5 0 0 0 1 0V9a.5.5 0 0 0-1 0v1a5 5 0 0 0 5 5h1a.5.5 0 0 0 0-1h-1a.5.5 0 0 0 0 1"/></svg></button>
                                     </div>
                                 </div>
                             ))}
                        </div>
                    </div>
                </div>
            </div>

            <WeddingConcierge />
            <Guestbook />

            <div className="mt-12 text-center text-rose-900/40 text-sm font-serif italic pb-12">
                We look forward to celebrating with you.
            </div>

            {/* Visit Counter */}
            <div className="fixed bottom-2 left-1/2 -translate-x-1/2 z-40 text-[10px] text-slate-400/30 font-mono pointer-events-none select-none">
                {counts.visits || 0}
            </div>
          </div>
        );
      };

      const Footer = () => (
        <footer className="mt-16 mb-24 px-6 text-center">
            <div className="max-w-md mx-auto p-8 bg-white/50 backdrop-blur-sm rounded-2xl border border-gold-200 shadow-sm">
                <p className="font-serif text-rose-900/60 italic mb-4 text-lg">Loving this digital invitation?</p>
                <a 
                    href="https://wa.me/923149974493" 
                    target="_blank" 
                    rel="noopener noreferrer"
                    className="inline-block bg-gradient-to-r from-gold-400 to-yellow-500 text-white px-8 py-3 rounded-full font-bold shadow-md hover:shadow-lg transform hover:-translate-y-1 transition-all uppercase tracking-widest text-sm mb-6"
                >
                    GET YOUR OWN CARD
                </a>
                <div className="h-px w-24 bg-gold-300 mx-auto mb-6 opacity-40"></div>
                <p className="text-[10px] uppercase tracking-[0.3em] text-slate-400 font-sans">
                    DEVELOPED WITH LOVE BY <span className="text-gold-600 font-bold">HILAL BAIG</span>
                </p>
            </div>
        </footer>
      );

      const App = () => {
        const { counts, handleReact } = useTracker();

        return (
          <>
            <PetalBackground />
            <InvitationCard counts={counts} />
            <Footer />
            <ReactionDock counts={counts} onReact={handleReact} />
          </>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
</body>
</html>
